
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Casino Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex flex-col antialiased select-none">
    <!-- Ambient Background -->
    <div class="fixed inset-0 -z-10 bg-[#0f172a]">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 blur-[120px] rounded-full"></div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-[100] px-4 py-3 flex justify-between items-center glass border-b border-white/5 shadow-2xl">
        <div class="flex items-center gap-3">
            <div id="user-avatar" class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center font-black text-white shadow-lg shadow-blue-600/20">?</div>
            <div>
                <div id="user-name" class="text-xs font-black uppercase tracking-widest opacity-40 leading-none mb-1">Загрузка...</div>
                <div class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-green-500 uppercase tracking-tighter">Online</span>
                </div>
            </div>
        </div>
        <div onclick="router.navigate('wallet')" class="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-2xl flex items-center gap-2 border border-white/10 transition-all active:scale-95">
            <div class="w-6 h-6 bg-yellow-500 rounded-lg flex items-center justify-center text-[10px] text-black font-black">₽</div>
            <span id="balance-display" class="font-mono font-black text-sm tracking-tight">0.00</span>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app" class="flex-grow overflow-x-hidden">
        <!-- Content injected here -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 z-[100] px-6 pb-6 pt-2 h-24">
        <div class="max-w-md mx-auto h-full glass-dark rounded-[2.5rem] border border-white/10 flex justify-around items-center px-4 shadow-2xl">
            <button onclick="router.navigate('home')" data-nav="home" class="nav-btn group">
                <i class="fas fa-grid-2 text-xl mb-1 transition-transform group-active:scale-75"></i>
                <span>Главная</span>
            </button>
            <button onclick="router.navigate('lobby-durak')" data-nav="lobby-durak" class="nav-btn group">
                <i class="fas fa-spade text-xl mb-1 transition-transform group-active:scale-75"></i>
                <span>PVP</span>
            </button>
            <button onclick="router.navigate('wallet')" data-nav="wallet" class="nav-btn group">
                <i class="fas fa-vault text-xl mb-1 transition-transform group-active:scale-75"></i>
                <span>Банк</span>
            </button>
            <button onclick="router.navigate('profile')" data-nav="profile" class="nav-btn group">
                <i class="fas fa-user-ninja text-xl mb-1 transition-transform group-active:scale-75"></i>
                <span>Профиль</span>
            </button>
        </div>
    </nav>

    <script type="module" src="src/app.js"></script>
</body>
</html>
